# @package _global_
# Tiny end-to-end run on CPU with random data, a small backbone and no downloads.
# Usage: python train.py +experiment=smoke
defaults:
  - override /train: smoke

device: cpu

model:
  backbone: vit_tiny_patch16_224
  pretrained: false

data:
  fake: true
  batch_size: 8
  num_workers: 0

wandb:
  mode: disabled

train:
  ckpt: outputs/smoke.pt   # keep smoke runs away from the real best checkpoint
